name: Debug VPS Dokploy

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  debug-dokploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Run Dokploy VPS Diagnostics
        env:
          DOKPLOY_URL: ${{ vars.DOKPLOY_URL }}
          DOKPLOY_TOKEN: ${{ secrets.DOKPLOY_TOKEN }}
          COMPOSE_ID: ${{ vars.DOKPLOY_COMPOSE_ID }}
        run: |
          pip install paramiko
          python scripts/diagnose_dokploy.py
          python scripts/get_vps_logs.py

      - name: Commit and Push Status Report
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add debug-vps-status.json vps-container-logs.json || true
          git commit -m "chore: update VPS debug status [skip ci]" || echo "No changes to commit"
          git push
