services:
  vendetta-v4:
    build: .
    container_name: vendetta-app-v4
    restart: always
    ports:
      - "3005:3000"
    environment:
      - DATABASE_URL=file:/app/prisma/prod.db
      - AUTH_SECRET=${AUTH_SECRET}
      - AUTH_TRUST_HOST=true
      - EVOLUTION_BASE_URL=${EVOLUTION_BASE_URL}
      - EVOLUTION_API_KEY=${EVOLUTION_API_KEY}
      - EVOLUTION_INSTANCE=${EVOLUTION_INSTANCE}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
      - GOOGLE_REFRESH_TOKEN=${GOOGLE_REFRESH_TOKEN}
      - GOOGLE_CALENDAR_ID=${GOOGLE_CALENDAR_ID}
      - STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY}
      - STRIPE_WEBHOOK_SECRET=${STRIPE_WEBHOOK_SECRET}
      - NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY=${NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY}
      - NEXT_PUBLIC_APP_URL=${NEXT_PUBLIC_APP_URL}
      - ADMIN_WHATSAPP_NUMBER=${ADMIN_WHATSAPP_NUMBER}
      - GOOGLE_MAPS_API_KEY=${GOOGLE_MAPS_API_KEY}
      - DEFAULT_ORIGIN_ADDRESS=${DEFAULT_ORIGIN_ADDRESS}
      - FUEL_PRICE_MXN=${FUEL_PRICE_MXN}
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.vendetta.rule=Host(`vendetta.mx`) || Host(`www.vendetta.mx`)"
      - "traefik.http.routers.vendetta.entrypoints=websecure"
      - "traefik.http.routers.vendetta.tls.certresolver=letsencrypt"
      - "traefik.http.services.vendetta.loadbalancer.server.port=3000"
      - "traefik.docker.network=dokploy-network"
    networks:
      - default
      - dokploy-network
    volumes:
      - /opt/vendetta/prisma:/app/prisma
      - /opt/vendetta/public/assets:/app/public/assets
      - /opt/vendetta/public/images/uploads:/app/public/images/uploads
      - /opt/vendetta/public/images/musicians:/app/public/images/musicians

networks:
  dokploy-network:
    external: true
